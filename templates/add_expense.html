{% extends "base.html" %}
{% block content %}

<div class="card form-card" style="max-width:500px; margin:40px auto;">
    <h3 style="text-align:center; margin-bottom:20px;">Add Expense</h3>

    <form method="post">

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Time</label>
        <input type="time" name="time" required>

        <label>Amount</label>
        <input type="number" name="amount" placeholder="Enter amount" required>

        <label>Category</label>
        <select name="category">
            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Other</option>
        </select>

        <label>Reason</label>
        <select name="reason">
            <option>Need</option>
            <option>Stress</option>
            <option>Friends</option>
            <option>Celebration</option>
        </select>

        <button type="submit" style="width:100%; margin-top:15px;">
            Add Expense
        </button>
    </form>
</div>

{% endblock %}
