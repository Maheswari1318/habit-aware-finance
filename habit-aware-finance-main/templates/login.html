{% extends "base.html" %}
{% block content %}

<div class="card auth-card">
    <h2>Welcome Back 👋</h2>
    <p style="color:#6b7280;">
  Track spending • Build habits • Stay in control
</p>

    <form method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit" class="primary" style="margin-top:15px;">
            Login → 
        </button>
    </form>

    <p style="text-align:center; margin-top:18px; font-size:14px;">
        New user?
        <a href="/signup" style="color:#4b7bec; font-weight:600;">
            Create an account
        </a>
    </p>
</div>

{% endblock %}
